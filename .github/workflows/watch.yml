name: Badlands Watch

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: watch
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Surveiller
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python watch.py

      - name: Sauvegarder l'etat
        run: |
          git config user.name  "badlands-watch"
          git config user.email "bot@users.noreply.github.com"
          git add data/state.json
          git diff --quiet --cached || git commit -m "state $(date -u +'%d/%m %H:%M')"
          git pull --rebase --autostash origin ${{ github.ref_name }} || true
          git push
